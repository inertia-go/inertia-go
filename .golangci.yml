version: "2"

run:
  timeout: 5m
  go: "1.23"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - misspell
  settings:
    gocyclo:
      min-complexity: 18
    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: unused-parameter
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
